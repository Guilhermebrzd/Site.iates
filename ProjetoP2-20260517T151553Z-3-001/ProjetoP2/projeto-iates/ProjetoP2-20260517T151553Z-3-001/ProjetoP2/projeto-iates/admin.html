<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxo - Login Admin</title>
    <link rel="shortcut icon" href="images/barco2.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/default.css" />
  </head>

  <body>
    <div class="page">
    <header>
      <div id="title">
        <img src="images/barco1.png" alt="ícone de barco" />
        <div class="headtitle">
          <h1>Luxo</h1>
          <h2>Aluguel de iates</h2>
        </div>
      </div>

      <nav>
        <ul class="navmenu">
          <li><a href="index.html">Página inicial</a></li>
          <li><a href="aluguel.html">Aluguel de iates</a></li>
          <li><a href="destinos.html">Destinos</a></li>
          <li><a href="tripulacao.html">Tripulação</a></li>
          <li><a href="contato.html">Contato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="pagtitle">
        <div class="bgtitle"></div>
        <h2>Acesso Restrito (Admin)</h2>
      </div>

      
      <form id="form-login">
        <div class="entry">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" />
        </div>

        <div class="entry">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" />
        </div>
      </form>

      <div class="buttons">
        <button class="button" id="btn-entrar">Entrar</button>
      </div>
    </main>
    </div>

    <footer>
      <p>© 2023 por Luxo aluguel de iates</p>
    </footer>

   
    <script src="js/jquery-3.6.4.min.js"></script>
    <script src="js/api.js"></script>

    <script>
      $(document).ready(function() {
          
          $('#btn-entrar').on('click', function() {
              
              
              var emailDigitado = $('#login-email').val();
              var senhaDigitada = $('#login-senha').val();

              
              var objLoginSenha = {
                  email: emailDigitado,
                  senha: senhaDigitada
              };

              
              var loginValido = validarUsuario(objLoginSenha);

              if (loginValido) {
                  
                  window.location.href = 'mensagens.html';
              } else {
                  
                  alert('E-mail e Senha inválidos');
              }
          });
      });
    </script>
  </body>
</html>
